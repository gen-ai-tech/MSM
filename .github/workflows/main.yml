name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # or master (check your repo)

permissions:
  contents: read
  pages: write
  id-token: write   # ⭐ THIS FIXES YOUR ERROR

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./   # change if needed (dist/build)

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
